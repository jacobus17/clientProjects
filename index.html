<!DOCTYPE html>

<html>

<head>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDN7kOijD82HnGgDdhMITjfs3k2rkZGZ90&callback=initMap" async defer></script>



    <style>

        html, body {

            height: 100%;

            margin: 0;

            padding: 0;

        }



        #map {

            width: 100%;

            height: 100vh;

        }



        .info-window {

            width: 250px;

            font-size: 14px;

        }



        .info-window img {

            width: 100%;

            height: auto;

            border-radius: 5px;

            margin-top: 8px;

        }

    </style>

</head>



<body>

<div id="map"></div>



<script>

    function initMap() {



        // Create map centered on Calgary

        var map = new google.maps.Map(document.getElementById("map"), {

            center: { lat: 51.0447, lng: -114.0719 },

            zoom: 4,



            mapTypeControl: false,



            // Disable scroll wheel zoom

            scrollwheel: false,

            gestureHandling: "greedy",



            styles: [

                { elementType: "geometry", stylers: [{ color: "#242C38" }] },

                { elementType: "labels.text.stroke", stylers: [{ color: "#242C38" }] },

                { elementType: "labels.text.fill", stylers: [{ color: "#556782" }] },

                { featureType: "administrative", elementType: "geometry", stylers: [{ color: "#dcdcdc" }] },

                { featureType: "water", elementType: "geometry", stylers: [{ color: "#151921" }] },

                { featureType: "road", elementType: "geometry", stylers: [{ color: "#b3b3b3" }] },

                { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#cccccc" }] },

                { featureType: "road", elementType: "labels", stylers: [{ visibility: "off" }] },

                { featureType: "road.highway", elementType: "labels", stylers: [{ visibility: "off" }] }

            ]

        });



        // Custom map pin

        var customIcon = {

            url: "https://framerusercontent.com/images/RRd7nDuDF2uUE9nWXPCE6usU.svg?width=146&height=171",

            scaledSize: new google.maps.Size(30, 40)

        };



        var currentInfoWindow = null;



        // Map locations

        var locations = [

            {

                position: { lat: 51.0447, lng: -114.0719 },

                title: "Quantum HQ",

                image: "https://framerusercontent.com/images/a5F1qWcQZRadC5zpt1eDTnu6P8.jpg?scale-down-to=512&width=3863&height=2173"

            }

        ];



        // Create markers

        locations.forEach(function (loc) {



            var marker = new google.maps.Marker({

                position: loc.position,

                map: map,

                title: loc.title,

                icon: customIcon

            });



            var infoWindow = new google.maps.InfoWindow({

                content: `

                    <div class="info-window">

                        <h3>${loc.title}</h3>



                        <img src="${loc.image}" alt="${loc.title}">

                    </div>

                `

            });



            marker.addListener("click", function () {



                if (currentInfoWindow) {

                    currentInfoWindow.close();

                }



                infoWindow.open(map, marker);

                currentInfoWindow = infoWindow;



            });

        });

    }

</script>



</body>

</html>
